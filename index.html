  </main>

  <script>
    (function () {
      const target = new URL("oferta.html", window.location.href);
      const currentParams = new URLSearchParams(window.location.search);

      currentParams.forEach(function (value, key) {
        if (value) target.searchParams.set(key, value);
      });

      document.getElementById("manual-link").href = target.toString();

      // Pequeno atraso para garantir que o Meta Pixel envie o PageView
      // antes da navegação interromper a requisição de rede.
      window.setTimeout(function () {
        window.location.replace(target.toString());
      }, 400);
    })();
  </script>
